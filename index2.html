<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0 ;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background: #8BC6EC;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 10px;

            display: flex;
            flex-direction: column;
            align-items: center;

        }
        .card{
            
            height: 650px;
            width: 400px;
            background-color: white;
            border-radius: 20px;
            box-sizing: border-box;
            
        }
        .card img{
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .textBox{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;    
        }

        #amountBox{
            height: 10%;
            width: 80%;
            background-color: aquamarine;
            margin: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;  
            align-items: center;
            padding-right: 20px;
            padding-left: 20px;

        }
        .leftBox{
        
            width: fit-content;
            display: flex;
            gap: 15px;
        }
        .leftBox img{
            height: 3.5rem;
            width: 4rem;
        }
        #button{  
            margin: 50px;
            width: 70%;
            height: 10%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: darkblue;
            color: white;
            box-shadow: rgba(0, 0, 0, 0.19) 0px 10px 20px, rgba(0, 0, 0, 0.23) 0px 6px 6px;
            
        }
        .cancelBox{
            text-decoration: none;
            color: gray;
        }
        .cancelBox{
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }
    </style>
</head>
<body> 
    <div class="container">
        <div class="card">
            <img src="2ndimg.jpg" alt="img">

             <div class="textBox">
            <h2>Order Summary</h2>

            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ipsum sint excepturi eveniet dicta nemo ad minima doloribus harum ratione quasi.</p>
        </div>

        <div id="amountBox">
            <div class="leftBox">
                <img src="music.jpg" alt="">
            </div>
            <div class="textAmountBox">
                <p>Amount</p>
                <p>Rs.99.99/year</p>
            </div>

            <div class="rightBox">
                <a href="#">change</a>
            </div>
        </div>
            <button id="button">
            Proceed to Payment</button>

            <div class="cancelBox">
            <a href="#"> cancel order</a>
           </div>
        </div>
        

       

    </div>
</body>
</html>
